<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/main.css" />
    <script src="../JavaScript/data.js"></script>
    <script src="../JavaScript/table.js"></script>
    <script src="../JavaScript/filter.js"></script>
    <script src="../JavaScript/sort.js"></script>
    <script src="../JavaScript/main.js"></script>
    <title>Бестиарий</title>
  </head>
  <body>
    <nav>
      <a href="main.html">Самые популярные существа</a><br />
      <b><a href="data.html">Список самых популярных существ</a></b>
    </nav>

    <hr />

    <details>
      <summary>График</summary>

      <form action="#" method="get">
        <legend>
          <p><b>Значение по оси OX</b></p>
        </legend>
        <label
          ><input type="radio" name="ox" value="classification" />
          Классификация</label
        ><br />
        <label
          ><input type="radio" name="ox" value="habitat" /> Место
          обитания</label
        ><br />
        <label><input type="radio" name="ox" value="height" /> Рост</label>

        <legend>
          <p><b>Значение по оси OY</b></p>
        </legend>
        <label
          ><input type="checkbox" name="oy" value="max_danger" /> Максимальный
          уровень опасности</label
        ><br />
        <label
          ><input type="checkbox" name="oy" value="min_danger" /> Минимальный
          уровень опасности</label
        ><br />
        <label
          ><input type="checkbox" name="oy" value="avg_danger" /> Средний
          уровень опасности</label
        >

        <p><input type="submit" value="Построить" /></p>
        <p><i>Здесь будет график</i></p>
      </form>
    </details>

    <div class="forms">
      <details>
        <summary>Фильтр</summary>

        <form id="filter">
          <p>
            <label for="structure">Имя:</label>
            <input type="text" id="structure" />
          </p>

          <p>
            <label for="category">Категория:</label>
            <input type="text" id="category" />
          </p>

          <p>
            <label for="country">Место обитания:</label>
            <input type="text" id="country" />
          </p>

          <p>
            <label for="heightFrom">Рост: </label>
            от <input type="number" id="heightFrom" /> до
            <input type="number" id="heightTo" />
          </p>

          <p>
            <label for="dangerLevelFrom">Уровень опасности: </label>
            от <input type="number" id="dangerLevelFrom" /> до
            <input type="number" id="dangerLevelTo" />
          </p>

          <input type="button" value="Найти" id="filterBtn" />
          <input type="button" value="Очистить фильтры" id="clearBtn" />
        </form>
      </details>

      <details>
        <summary>Сортировка</summary>
        <form id="sort">
          <p>Сортировать по</p>
          <p>
            <select id="fieldsFirst"></select>
            по убыванию? <input type="checkbox" id="fieldsFirstDesc" />
          </p>
          <p>
            <select id="fieldsSecond"></select>
            по убыванию? <input type="checkbox" id="fieldsSecondDesc" />
          </p>
          <input type="button" value="Сортировать" id="sortBtn" />
          <input type="button" value="Сбросить сортировку" id="resetSortBtn" />
        </form>
      </details>
    </div>
    <table id="list"></table>
  </body>
</html>
